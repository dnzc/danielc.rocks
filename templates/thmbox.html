{%- set nm = name | default(value="") -%}
{%- set label = label | default(value="") -%}
<div class="thmbox thmbox-{{ kind | lower }}"{% if label %} id="thm-{{ label | slugify }}"{% endif %}>
<p class="thmbox-head"><span class="thmbox-name">{{ kind }}</span>{% if nm %} <span class="thmbox-title">({{ nm }})</span>{% endif %}</p>
<div class="thmbox-body">

{{ body | markdown | safe }}

</div>
</div>
