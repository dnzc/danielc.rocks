{# A silent, auto-looping clip (lightweight gif replacement).
   src is relative to the page (colocated) or an absolute /path.
   Pass mp4= as well to provide a fallback source for older browsers.
   Usage: {{ video(src="old-site.webm", mp4="old-site.mp4", caption="...", width="34rem") }} #}
<figure class="figure"{% if width %} style="max-width: {{ width }}"{% endif %}>
  <video class="figure-media" autoplay loop muted playsinline preload="metadata"{% if poster %} poster="{{ poster }}"{% endif %}>
    <source src="{{ src }}" type="video/{{ src | split(pat='.') | last }}">
    {% if mp4 %}<source src="{{ mp4 }}" type="video/mp4">{% endif %}
    {{ alt | default(value="Your browser doesn't support embedded video.") }}
  </video>
  {% if caption %}<figcaption>{{ caption | safe }}</figcaption>{% endif %}
</figure>
