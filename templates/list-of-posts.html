{% extends "base.html" %}

{% block content %}
<div class="prose">
  {{ section.content | safe }}
  <a class="rss-link" href="{{ get_url(path='posts/rss.xml') | safe }}" title="Subscribe via RSS" aria-label="Subscribe via RSS">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
      <circle cx="6.18" cy="17.82" r="2.18"/>
      <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83C19.56 11.4 12.6 4.44 4 4.44z"/>
      <path d="M4 10.1v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83C13.9 14.36 9.64 10.1 4 10.1z"/>
    </svg>
    <span>RSS</span>
  </a>
</div>

<ul class="list-of-posts">
  {% for page in section.pages %}
    <li>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
      {% if page.date %}<span class="date">{{ page.date | date(format="%Y-%m-%d") }}</span>{% endif %}
    </li>
  {% endfor %}
</ul>
{% endblock content %}
