{% extends "base.html" %}

{% block content %}
<div class="prose">
  {{ section.content | safe }}
</div>

<ul class="list-of-posts">
  {% for page in section.pages %}
    <li>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
      {% if page.date %}<span class="date">{{ page.date | date(format="%Y-%m-%d") }}</span>{% endif %}
    </li>
  {% endfor %}
</ul>
{% endblock content %}
